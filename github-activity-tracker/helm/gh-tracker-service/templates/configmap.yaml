apiVersion: v1
kind: ConfigMap
metadata:
  name: rds-config
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  rds-host: {{ .Values.gh-tracker-service.configmaps.rds.rds_host | quote }}
  rds-database: {{ .Values.gh-tracker-service.configmaps.rds.rds_database | quote }}
  rds-port: {{ .Values.gh-tracker-service.configmaps.rds.rds_port | quote }}
  rds-username: {{ .Values.gh-tracker-service.configmaps.rds.rds_username | quote }}
