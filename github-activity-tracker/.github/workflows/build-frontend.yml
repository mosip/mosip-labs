name: Build and Deploy Frontend

on:
  push:
    branches: [ intern ]
    paths:
      - 'github-activity-tracker/frontend/**'
  pull_request:
    branches: [ intern ]
    paths:
      - 'github-activity-tracker/frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd github-activity-tracker/frontend
        npm install

    - name: Build frontend
      run: |
        cd github-activity-tracker/frontend
        npm run build

    - name: Configure AWS credentials
      if: github.event_name == 'push' && github.ref == 'refs/heads/intern'
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    - name: Deploy to S3
      if: github.event_name == 'push' && github.ref == 'refs/heads/intern'
      run: |
        aws s3 sync github-activity-tracker/frontend/dist/ s3://github-activity-frontend --delete